<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Leaflet Map Mobile</title>
  <!-- Leaflet CSS from CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    /* Reset margins and make body fill screen */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    /* Map fills entire viewport */
    #map {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Leaflet JS from CDN -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
 <script>
  var map = L.map('map').setView([38.627, -90.199], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Load markers from JSON file
  fetch('data.json')
    .then(response => response.json())
    .then(data => {
      data.forEach(item => {
        L.marker([item.lat, item.lng]).addTo(map)
          .bindPopup(item.name);
        map.on('click', function(e) {
  var lat = e.latlng.lat;
  var lng = e.latlng.lng;

  // Aquí llamamos al endpoint de Bubble para crear el incidente
  fetch('https://tu-app.bubbleapps.io/version-test/api/1.1/obj/Incident', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
      // Si tu app requiere autenticación, aquí va el token
    },
    body: JSON.stringify({
      lat: lat,
      lng: lng,
      tipo: "robo",        // ejemplo, luego lo puedes hacer dinámico
      codigo: Math.random().toString(36).substring(2,8) // genera un código simple
    })
  })
  .then(response => response.json())
  .then(data => {
    console.log("Incidente guardado:", data);
    L.marker([lat, lng]).addTo(map)
      .bindPopup("Incidente registrado (Código: " + data.response.codigo + ")");
  });
});

      });
    });
</script>


    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Add a marker
    L.marker([38.627, -90.199]).addTo(map)
      .bindPopup('Hello from St. Louis!')
      .openPopup();
  </script>
</body>
</html>
