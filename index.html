<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Leaflet Map Mobile</title>
  <!-- Leaflet CSS from CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    /* Reset margins and make body fill screen */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    /* Map fills entire viewport */
    #map {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Leaflet JS from CDN -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
 <script>
  var map = L.map('map').setView([38.627, -90.199], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Load markers from JSON file
  fetch('data.json')
    .then(response => response.json())
    .then(data => {
      data.forEach(item => {
        L.marker([item.lat, item.lng]).addTo(map)
          .bindPopup(item.name);
      });
    });
</script>


    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Add a marker
    L.marker([38.627, -90.199]).addTo(map)
      .bindPopup('Hello from St. Louis!')
      .openPopup();
  </script>
</body>
</html>
